<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>22.10.2025</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

body {
  font-family: Georgia, "Times New Roman", serif;
  color: white;
}

.sky {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(
      to bottom,
      rgba(0,0,0,.15),
      rgba(0,0,0,.05),
      rgba(0,0,0,.45)
    ),
    url("62C97575-0098-4D78-90DD-D067FC1A53A6.png");

  background-size: cover;
  background-position: center;
  animation: appear 4s ease forwards, drift 25s ease-in-out infinite alternate;
}

.content {
  position: fixed;
  inset: 0;
  z-index: 2;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  text-align: center;
  padding: 25px;

  opacity: 0;
  animation: reveal 3s ease 2s forwards;
}

.date {
  font-size: clamp(42px, 11vw, 72px);
  font-weight: 400;
  letter-spacing: 7px;
  white-space: nowrap;
  text-shadow: 0 2px 25px #000;
}

.line {
  width: 45px;
  height: 1px;
  background: rgba(255,255,255,.7);
  margin: 24px 0;
}

.text {
  font-size: clamp(17px, 4.5vw, 25px);
  letter-spacing: 4px;
  font-style: italic;
  opacity: .9;
  text-shadow: 0 2px 15px #000;
}

.coordinates {
  margin-top: 35px;
  font-size: 15px;
  letter-spacing: 3px;
  opacity: .7;
  text-shadow: 0 2px 12px #000;
}

.hint {
  position: fixed;
  bottom: 42px;
  left: 0;
  right: 0;
  z-index: 3;

  text-align: center;
  font-family: Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  opacity: 0;

  animation: reveal 2s ease 4s forwards;
}

@keyframes appear {
  from {
    opacity: 0;
    transform: scale(1.06);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes reveal {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes drift {
  from {
    transform: scale(1);
  }
  to {
    transform: scale(1.04);
  }
}
</style>
</head>

<body>

<div class="sky"></div>

<div class="content">
  <div class="date">22.10.2025</div>

  <div class="line"></div>

  <div class="text">
    The Night Everything Began
  </div>

  <div class="coordinates">
    39.6604° N · 27.9101° E
  </div>
</div>

<div class="hint">
  SOME NIGHTS ARE NEVER FORGOTTEN
</div>
<a class="music-button"
   href="https://open.spotify.com/search/Karsu%20Jest%20Oldu"
   target="_blank">
   ♫ &nbsp; JEST OLDU
</a>

<style>
.music-button {
  position: fixed;
  bottom: 85px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;

  padding: 13px 22px;
  border: 1px solid rgba(255,255,255,.55);
  border-radius: 30px;

  color: white;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(8px);

  font-family: Arial, sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-decoration: none;
  white-space: nowrap;
}
</style>
</body>
</html>
