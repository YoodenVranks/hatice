<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>22 October 2025</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:'Cormorant Garamond',serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
text-align:center;
opacity:0;
animation:fade 3s forwards;
animation-delay:2s;
padding:25px;
}

h1{
font-size:42px;
font-weight:300;
letter-spacing:4px;
}

h2{
margin-top:10px;
font-size:18px;
font-weight:300;
opacity:.8;
letter-spacing:3px;
}

.coord{
margin-top:35px;
font-size:18px;
opacity:.65;
letter-spacing:2px;
}

button{
margin-top:45px;
padding:14px 28px;
background:transparent;
border:1px solid white;
color:white;
font-size:16px;
letter-spacing:2px;
cursor:pointer;
transition:.4s;
}

button:hover{
background:white;
color:black;
}

@keyframes fade{
to{
opacity:1;
}
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h1>22 October 2025</h1>

<h2>The Night Everything Began</h2>

<div class="coord">

39.6604° N · 27.9101° E

</div>

<button onclick="window.open('https://open.spotify.com/search/Jest%20Oldu','_blank')">

Begin

</button>

</div>

<script>

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<180;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*1.7,

a:Math.random(),

d:Math.random()*0.02

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.globalAlpha=s.a;

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fill();

s.a+=s.d;

if(s.a>=1||s.a<=0){

s.d=-s.d;

}

});

requestAnimationFrame(draw);

}

draw();

window.onresize=()=>{

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

</script>

</body>
</html>
